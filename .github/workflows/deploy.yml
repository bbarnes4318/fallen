name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: hoppwhistle
  REGION: us-east4
  REPO_NAME: facial-app-repo
  BACKEND_IMAGE: us-east4-docker.pkg.dev/hoppwhistle/facial-app-repo/facial-backend
  FRONTEND_IMAGE: us-east4-docker.pkg.dev/hoppwhistle/facial-app-repo/facial-frontend

jobs:
  # ── Build Backend & Frontend in parallel ──
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}
          token_format: 'access_token'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: us-east4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}
          token_format: 'access_token'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: us-east4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  # ── Deploy both after builds finish ──
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: facial-backend
          region: us-east4
          image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          flags: '--service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com --memory=4Gi --cpu=2 --timeout=300 --concurrency=10 --allow-unauthenticated'
          env_vars: |
            KMS_KEY_NAME=${{ secrets.KMS_KEY_NAME }}
            BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            DB_NAME=${{ secrets.DB_NAME }}
            CLOUD_SQL_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}

      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: facial-frontend
          region: us-east4
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          flags: '--service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com --memory=1Gi --allow-unauthenticated'
          env_vars: |
            NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}
