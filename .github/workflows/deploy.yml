name: Deploy to Google Cloud Run

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: hoppwhistle
  REGION: us-east4
  REPO_NAME: facial-app-repo
  BACKEND_IMAGE: us-east4-docker.pkg.dev/hoppwhistle/facial-app-repo/facial-backend
  FRONTEND_IMAGE: us-east4-docker.pkg.dev/hoppwhistle/facial-app-repo/facial-frontend

jobs:
  # ── Build Backend & Frontend in parallel ──
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}
          token_format: 'access_token'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: us-east4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}
          token_format: 'access_token'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: us-east4-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  # ── Deploy all services after builds finish ──
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: facial-backend
          region: us-east4
          image: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          flags: '--service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com --memory=8Gi --cpu=4 --timeout=300 --concurrency=10 --allow-unauthenticated --add-cloudsql-instances=hoppwhistle:us-central1:facial-pg-instance'
          env_vars: |
            KMS_KEY_NAME=projects/hoppwhistle/locations/us-central1/keyRings/facial-keyring/cryptoKeys/facial-dek
            BUCKET_NAME=hoppwhistle-facial-uploads
            DB_USER=facial_app
            DB_PASS=${{ secrets.DB_PASS }}
            DB_NAME=facial_db
            CLOUD_SQL_CONNECTION_NAME=hoppwhistle:us-central1:facial-pg-instance
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}

      - name: Deploy Wikimedia Crawler Job
        run: |
          gcloud run jobs deploy wikimedia-crawler-job \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --command="python" \
            --args="scripts/wikimedia_crawler.py" \
            --service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com \
            --memory=8Gi \
            --cpu=4 \
            --task-timeout=3600 \
            --max-retries=1 \
            --set-cloudsql-instances=hoppwhistle:us-central1:facial-pg-instance \
            --set-env-vars="KMS_KEY_NAME=projects/hoppwhistle/locations/us-central1/keyRings/facial-keyring/cryptoKeys/facial-dek,BUCKET_NAME=hoppwhistle-facial-uploads,DB_USER=facial_app,DB_PASS=${{ secrets.DB_PASS }},DB_NAME=facial_db,CLOUD_SQL_CONNECTION_NAME=hoppwhistle:us-central1:facial-pg-instance"

      - name: Deploy ArcFace Migration Job
        run: |
          gcloud run jobs deploy arcface-migration-job \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --command="python" \
            --args="scripts/migrate_arcface.py" \
            --service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com \
            --memory=8Gi \
            --cpu=4 \
            --task-timeout=3600 \
            --max-retries=0 \
            --set-cloudsql-instances=hoppwhistle:us-central1:facial-pg-instance \
            --set-env-vars="KMS_KEY_NAME=projects/hoppwhistle/locations/us-central1/keyRings/facial-keyring/cryptoKeys/facial-dek,BUCKET_NAME=hoppwhistle-facial-uploads,DB_USER=facial_app,DB_PASS=${{ secrets.DB_PASS }},DB_NAME=facial_db,CLOUD_SQL_CONNECTION_NAME=hoppwhistle:us-central1:facial-pg-instance"

      - name: Deploy Mass Ingestion Job
        run: |
          gcloud run jobs deploy mass-ingestion-job \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --command="python" \
            --args="scripts/mass_ingest.py" \
            --service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com \
            --memory=16Gi \
            --cpu=8 \
            --task-timeout=3600 \
            --max-retries=1 \
            --set-cloudsql-instances=hoppwhistle:us-central1:facial-pg-instance \
            --set-env-vars="KMS_KEY_NAME=projects/hoppwhistle/locations/us-central1/keyRings/facial-keyring/cryptoKeys/facial-dek,BUCKET_NAME=hoppwhistle-facial-uploads,DB_USER=facial_app,DB_PASS=${{ secrets.DB_PASS }},DB_NAME=facial_db,CLOUD_SQL_CONNECTION_NAME=hoppwhistle:us-central1:facial-pg-instance"

      - name: Deploy LFW Calibration Job
        run: |
          gcloud run jobs deploy lfw-calibration-job \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --command="python" \
            --args="scripts/calibrate_lfw.py" \
            --service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com \
            --memory=8Gi \
            --cpu=4 \
            --task-timeout=7200 \
            --max-retries=1 \
            --set-env-vars="BUCKET_NAME=hoppwhistle-facial-uploads"

      - name: Deploy Identity Graph Generator Job
        run: |
          gcloud run jobs deploy identity-graph-job \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --command="python" \
            --args="scripts/generate_identity_graph.py" \
            --service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com \
            --memory=4Gi \
            --cpu=4 \
            --task-timeout=3600 \
            --max-retries=1 \
            --set-cloudsql-instances=hoppwhistle:us-central1:facial-pg-instance \
            --set-env-vars="KMS_KEY_NAME=projects/hoppwhistle/locations/us-central1/keyRings/facial-keyring/cryptoKeys/facial-dek,BUCKET_NAME=hoppwhistle-facial-uploads,DB_USER=facial_app,DB_PASS=${{ secrets.DB_PASS }},DB_NAME=facial_db,CLOUD_SQL_CONNECTION_NAME=hoppwhistle:us-central1:facial-pg-instance"

      - name: Deploy WORM Ledger Anchor Job
        run: |
          gcloud run jobs deploy worm-anchor-job \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --command="python" \
            --args="scripts/anchor_ledger.py" \
            --service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com \
            --memory=1Gi \
            --cpu=1 \
            --task-timeout=600 \
            --max-retries=1 \
            --set-cloudsql-instances=hoppwhistle:us-central1:facial-pg-instance \
            --set-env-vars="BUCKET_NAME=hoppwhistle-facial-uploads,DB_USER=facial_app,DB_PASS=${{ secrets.DB_PASS }},DB_NAME=facial_db,CLOUD_SQL_CONNECTION_NAME=hoppwhistle:us-central1:facial-pg-instance"

      - name: Deploy Gallery Re-Upload Job
        run: |
          gcloud run jobs deploy gallery-reupload-job \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --command="python" \
            --args="scripts/gallery_reupload.py" \
            --service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com \
            --memory=4Gi \
            --cpu=2 \
            --task-timeout=1800 \
            --max-retries=1 \
            --set-cloudsql-instances=hoppwhistle:us-central1:facial-pg-instance \
            --set-env-vars="BUCKET_NAME=hoppwhistle-facial-uploads,DB_USER=facial_app,DB_PASS=${{ secrets.DB_PASS }},DB_NAME=facial_db,CLOUD_SQL_CONNECTION_NAME=hoppwhistle:us-central1:facial-pg-instance"

      - name: Deploy Frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: facial-frontend
          region: us-east4
          image: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          flags: '--service-account=facial-runtime-sa@hoppwhistle.iam.gserviceaccount.com --memory=1Gi --allow-unauthenticated'
          env_vars: |
            NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}

