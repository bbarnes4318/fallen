name: CI Guardrails

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run Forbidden Strings Guardrail
        run: python scripts/check_forbidden_strings.py
        
      - name: Run Lightweight Security Helper Tests
        run: |
          pip install pytest fastapi sqlalchemy
          pytest backend/test_security_helpers.py -v

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Test Build
        working-directory: ./frontend
        run: npm run build

